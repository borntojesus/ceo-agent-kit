# Optional CI deploy: builds the checklist site on a GitHub-hosted runner and
# rsyncs it to the homelab web server over Tailscale.
#
# INACTIVE until these repo secrets exist (plus a tailnet ACL tag "ci"):
#   TS_OAUTH_CLIENT_ID, TS_OAUTH_SECRET, DEPLOY_SSH_KEY
# Until then the deploy path is site/deploy.sh (local build + push).
name: deploy-site

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths: ["site/**", "modules/**"]

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: site/package-lock.json

      - name: Build
        working-directory: site
        run: |
          npm ci
          npm run build

      - name: Check deploy secrets
        id: secrets
        run: |
          if [ -n "${{ secrets.TS_OAUTH_CLIENT_ID }}" ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "Deploy secrets not set; build-only run." >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Connect to tailnet
        if: steps.secrets.outputs.present == 'true'
        uses: tailscale/github-action@v3
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci

      - name: Deploy to homelab
        if: steps.secrets.outputs.present == 'true'
        run: |
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > /tmp/key && chmod 600 /tmp/key
          tar -C site/dist -czf /tmp/site.tgz .
          scp -i /tmp/key -o StrictHostKeyChecking=accept-new /tmp/site.tgz root@pve-homelab:/tmp/ai-kit-site.tgz
          ssh -i /tmp/key root@pve-homelab \
            "pct push 213 /tmp/ai-kit-site.tgz /tmp/ai-kit-site.tgz && pct exec 213 -- sh -c 'rm -rf /var/www/ai-kit-antonyuk.new && mkdir -p /var/www/ai-kit-antonyuk.new && tar -xzf /tmp/ai-kit-site.tgz -C /var/www/ai-kit-antonyuk.new && rm -rf /var/www/ai-kit-antonyuk.old && { [ -d /var/www/ai-kit-antonyuk ] && mv /var/www/ai-kit-antonyuk /var/www/ai-kit-antonyuk.old || true; } && mv /var/www/ai-kit-antonyuk.new /var/www/ai-kit-antonyuk && rm /tmp/ai-kit-site.tgz'"
